<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed — Manish Auto Garage</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="brand">🏍️ Manish Auto <span>Garage</span></a>
  <div class="nav-links">
    <a href="/dashboard.html">My Bookings</a>
  </div>
</nav>
<div class="page">
<div class="container">
<div style="max-width:500px;margin:40px auto;text-align:center">

  <div class="card">
    <div style="font-size:4rem;margin-bottom:10px">✅</div>
    <h2 style="color:#27ae60;margin-bottom:8px">Booking Confirmed!</h2>
    <p class="text-muted" style="margin-bottom:20px">Your appointment has been booked at Manish Auto Garage.</p>

    <div style="background:#f0fff4;border:1px solid #c3e6cb;padding:15px;border-radius:8px;margin-bottom:20px;text-align:left">
      <div id="confirmDetails" style="font-size:0.9rem;line-height:1.8">Loading...</div>
    </div>

    <p class="text-muted" style="font-size:0.85rem;margin-bottom:20px">
      📞 Questions? Call us: <a href="tel:+919867703767" style="color:#27ae60;font-weight:700">+91 88281 33876</a>
    </p>

    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <a href="/dashboard.html" class="btn btn-primary">View My Bookings</a>
      <a href="tel:+919867703767" class="btn btn-green">📞 Call Garage</a>
      <a href="/booking.html" class="btn btn-outline">Book Another</a>
    </div>
  </div>

</div>
</div>
</div>
<script src="js/app.js"></script>
<script>
  const id    = localStorage.getItem('lastBookingId');
  const total = localStorage.getItem('lastTotal');
  const el    = document.getElementById('confirmDetails');

  if (id && total) {
    el.innerHTML = `
      <strong>Booking ID:</strong> #${id}<br>
      <strong>Estimated Total:</strong> ${inr(total)}<br>
      <strong>Status:</strong> Pending<br>
      <strong>Payment:</strong> Unpaid (pay in My Bookings)
    `;
  } else {
    el.textContent = 'Booking confirmed. Check My Bookings for details.';
  }
</script>
</body>
</html>
