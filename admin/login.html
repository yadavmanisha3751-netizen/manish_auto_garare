<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Manish Auto Garage</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body style="background:#1a1a2e">
<div class="page">
<div class="container">
<div class="auth-box" style="margin-top:80px">

  <div class="text-center" style="margin-bottom:20px">
    <div style="font-size:2.5rem">🔧</div>
    <h2>Admin Login</h2>
    <div class="text-muted">Manish Auto Garage</div>
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" value="manish@manishautogarage.in" placeholder="admin email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn btn-primary btn-block" onclick="doLogin()" id="btnLogin">Login</button>

  <div class="text-center mt-10">
    <a href="/" class="text-muted" style="font-size:0.82rem">← Back to site</a>
  </div>
</div>
</div>
</div>

<script src="../js/app.js"></script>
<script>
  if (Auth.isAdmin()) location.href = '/admin/dashboard.html';

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { toast('Enter email and password', 'error'); return; }

    const btn = document.getElementById('btnLogin');
    btn.textContent = 'Logging in...'; btn.disabled = true;

    const { ok, data } = await api('/admin/login', 'POST', { email, password }, true);
    btn.textContent = 'Login'; btn.disabled = false;

    if (ok) {
      Auth.setAdminToken(data.token);
      Auth.setAdmin(data.admin);
      toast('Welcome, ' + data.admin.username + '!', 'success');
      setTimeout(() => location.href = '/admin/dashboard.html', 800);
    } else {
      toast(data.message, 'error');
    }
  }
</script>
</body>
</html>
